  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Display:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    body {
      font-family: 'Noto Sans', sans-serif;
      background-color: #fffaf5;
      background-image:
        radial-gradient(circle at top left, rgba(251, 146, 60, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(244, 114, 182, 0.10), transparent 24%),
        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.09), transparent 22%),
        linear-gradient(180deg, #fffaf5 0%, #fffdf9 100%);
      background-attachment: fixed;
      color: #0f172a;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1,
    h2,
    h3,
    .font-playful {
      font-family: 'Noto Sans Display', 'Noto Sans', sans-serif;
    }

    ::selection {
      background: rgba(251, 146, 60, 0.22);
      color: #0f172a;
    }

    .menu-card-hover {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .menu-card-hover:hover {
      transform: translateY(-8px) rotate(1deg);
    }

    @keyframes floating {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .animate-float {
      animation: floating 3s ease-in-out infinite;
    }

    /* Skrytí posuvníků napříč prohlížeči */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .animate-slide-in {
      animation: slideIn 0.3s ease-out forwards;
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      50% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .animate-bounce-in {
      animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @media (max-width: 640px) {
      body {
        background-attachment: scroll;
      }
    }
  </style>
